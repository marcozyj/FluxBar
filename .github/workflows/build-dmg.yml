name: Build DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (for example: v0.1.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          fi

          VERSION="0.1.1"
          if [[ -n "${TAG_NAME}" ]]; then
            VERSION="${TAG_NAME#v}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG_NAME}, version=${VERSION}"

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Verify Swift Version
        shell: bash
        run: |
          xcodebuild -version
          swift --version
          swift --version | grep -E "Swift version 6|Apple Swift version 6"

      - name: Build DMG
        shell: bash
        run: |
          chmod +x Scripts/build-local.sh Scripts/build-dmg.sh
          export FLUXBAR_APP_VERSION="${{ steps.meta.outputs.version }}"
          ./Scripts/build-dmg.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxBar-dmg-${{ github.sha }}
          path: BuildArtifacts/DMG/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release (tag only)
        if: steps.meta.outputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: FluxBar ${{ steps.meta.outputs.version }}
          files: BuildArtifacts/DMG/*.dmg
